<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vendor Tracker — Contacts Sync</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Title bar drag area */
    .titlebar {
      height: 38px;
      -webkit-app-region: drag;
      background: #fff;
      border-bottom: 1px solid #e5e5e5;
      display: flex;
      align-items: center;
      padding: 0 80px 0 16px;
      flex-shrink: 0;
    }
    .titlebar h1 {
      font-size: 13px;
      font-weight: 600;
      color: #1d1d1f;
      letter-spacing: -0.01em;
    }

    .content {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Auth screen ── */
    #auth-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px;
      gap: 24px;
    }
    .logo {
      width: 56px;
      height: 56px;
      background: #2563eb;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
    }
    #auth-screen h2 {
      font-size: 20px;
      font-weight: 700;
      text-align: center;
    }
    #auth-screen p {
      font-size: 13px;
      color: #6e6e73;
      text-align: center;
      max-width: 300px;
      line-height: 1.5;
    }
    .auth-form {
      width: 100%;
      max-width: 320px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    input[type="email"], input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #d2d2d7;
      border-radius: 10px;
      font-size: 14px;
      outline: none;
      background: #fff;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #2563eb; }
    .btn {
      padding: 10px 16px;
      border-radius: 10px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #1d4ed8; }
    .btn-outline {
      background: transparent;
      color: #2563eb;
      border: 1.5px solid #d2d2d7;
    }
    .btn-outline:hover { background: #f0f0f5; }
    .btn-danger { background: #ef4444; color: #fff; }
    .error-msg {
      font-size: 12px;
      color: #ef4444;
      text-align: center;
    }
    .info-msg {
      font-size: 12px;
      color: #6e6e73;
      text-align: center;
    }

    /* ── Main screen ── */
    #main-screen { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    .toolbar {
      background: #fff;
      border-bottom: 1px solid #e5e5e5;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .toolbar input[type="text"] {
      flex: 1;
      padding: 7px 10px;
      font-size: 13px;
      border-radius: 8px;
    }
    .toolbar .btn {
      font-size: 12px;
      padding: 7px 12px;
      border-radius: 8px;
      white-space: nowrap;
    }

    .status-bar {
      background: #fff;
      border-bottom: 1px solid #e5e5e5;
      padding: 6px 16px;
      font-size: 11px;
      color: #6e6e73;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .status-bar .user-info { font-weight: 500; }
    .status-bar .sync-msg { color: #34c759; }

    .contacts-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.1s;
    }
    .contact-item:hover { background: #f0f0f5; }
    .contact-item.linked { background: #eff6ff; }
    .contact-item.linked:hover { background: #dbeafe; }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #2563eb;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .contact-item.linked .avatar { background: #1d4ed8; }

    .contact-info { flex: 1; min-width: 0; }
    .contact-name {
      font-size: 13px;
      font-weight: 500;
      color: #1d1d1f;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .contact-sub {
      font-size: 11px;
      color: #6e6e73;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 20px;
      flex-shrink: 0;
    }
    .badge-synced { background: #d1fae5; color: #065f46; }

    .action-btn {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 6px;
      border: 1.5px solid;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.1s;
      flex-shrink: 0;
      background: transparent;
    }
    .action-btn.import { border-color: #2563eb; color: #2563eb; }
    .action-btn.import:hover { background: #2563eb; color: #fff; }
    .action-btn.unlink { border-color: #d1d5db; color: #6b7280; }
    .action-btn.unlink:hover { border-color: #ef4444; color: #ef4444; }

    .empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #6e6e73;
      padding: 40px;
      text-align: center;
    }
    .empty .icon { font-size: 36px; opacity: 0.4; }
    .empty p { font-size: 13px; line-height: 1.5; }

    .hidden { display: none !important; }
    .loading { opacity: 0.6; pointer-events: none; }
  </style>
</head>
<body>

<div class="titlebar">
  <h1>Vendor Tracker — Contacts Sync</h1>
</div>

<div class="content">

  <!-- Auth screen -->
  <div id="auth-screen">
    <div class="logo">🏢</div>
    <div>
      <h2>Sign in to Vendor Tracker</h2>
      <p style="margin-top:6px">Enter your email to receive a one-time code.</p>
    </div>

    <!-- Step 1: Email -->
    <div id="email-step" class="auth-form">
      <input type="email" id="email-input" placeholder="your@email.com" />
      <button class="btn btn-primary" id="send-code-btn">Send Code</button>
      <p class="error-msg hidden" id="email-error"></p>
    </div>

    <!-- Step 2: OTP -->
    <div id="otp-step" class="auth-form hidden">
      <p class="info-msg">Check your email for a 6-digit code.</p>
      <input type="text" id="otp-input" placeholder="123456" maxlength="6" inputmode="numeric" />
      <button class="btn btn-primary" id="verify-btn">Verify</button>
      <button class="btn btn-outline" id="back-btn">← Back</button>
      <p class="error-msg hidden" id="otp-error"></p>
    </div>
  </div>

  <!-- Main screen -->
  <div id="main-screen" class="hidden">
    <div class="status-bar">
      <span class="user-info" id="user-email"></span>
      <span class="sync-msg hidden" id="sync-msg"></span>
      <button class="btn btn-outline" id="logout-btn" style="font-size:11px;padding:3px 10px;border-radius:6px;">Sign out</button>
    </div>

    <div class="toolbar">
      <input type="text" id="search-input" placeholder="Search contacts…" />
      <button class="btn btn-primary" id="sync-btn">Sync Now</button>
    </div>

    <div class="contacts-list" id="contacts-list">
      <div class="empty"><div class="icon">👥</div><p>Loading contacts…</p></div>
    </div>
  </div>

</div>

<script>
  const api = window.api

  let macContacts = []
  let linkedIds = new Set()
  let searchQuery = ''
  let pendingEmail = ''

  // ── Auth ──────────────────────────────────────────────────────────────────

  async function init() {
    const session = await api.getSession()
    if (session) {
      showMain(session.email)
    } else {
      document.getElementById('auth-screen').classList.remove('hidden')
      document.getElementById('main-screen').classList.add('hidden')
    }
  }

  document.getElementById('send-code-btn').addEventListener('click', async () => {
    const email = document.getElementById('email-input').value.trim()
    if (!email) return
    const btn = document.getElementById('send-code-btn')
    btn.disabled = true
    btn.textContent = 'Sending…'
    const res = await api.login(email)
    btn.disabled = false
    btn.textContent = 'Send Code'
    if (res?.error) {
      showError('email-error', res.error)
    } else {
      pendingEmail = email
      document.getElementById('email-step').classList.add('hidden')
      document.getElementById('otp-step').classList.remove('hidden')
      document.getElementById('otp-input').focus()
    }
  })

  document.getElementById('back-btn').addEventListener('click', () => {
    document.getElementById('otp-step').classList.add('hidden')
    document.getElementById('email-step').classList.remove('hidden')
    hideError('otp-error')
  })

  document.getElementById('verify-btn').addEventListener('click', async () => {
    const token = document.getElementById('otp-input').value.trim()
    if (!token) return
    const btn = document.getElementById('verify-btn')
    btn.disabled = true
    btn.textContent = 'Verifying…'
    const res = await api.verifyOtp(pendingEmail, token)
    btn.disabled = false
    btn.textContent = 'Verify'
    if (res?.error) {
      showError('otp-error', res.error)
    } else {
      showMain(pendingEmail)
    }
  })

  document.getElementById('logout-btn').addEventListener('click', async () => {
    await api.logout()
    macContacts = []
    linkedIds.clear()
    document.getElementById('main-screen').classList.add('hidden')
    document.getElementById('auth-screen').classList.remove('hidden')
    document.getElementById('email-step').classList.remove('hidden')
    document.getElementById('otp-step').classList.add('hidden')
    document.getElementById('email-input').value = ''
    document.getElementById('otp-input').value = ''
  })

  // ── Main screen ───────────────────────────────────────────────────────────

  async function showMain(email) {
    document.getElementById('auth-screen').classList.add('hidden')
    document.getElementById('main-screen').classList.remove('hidden')
    document.getElementById('user-email').textContent = email
    await loadContacts()
  }

  async function loadContacts() {
    document.getElementById('contacts-list').innerHTML =
      '<div class="empty"><div class="icon">👥</div><p>Loading contacts…</p></div>'

    const [mac, ids] = await Promise.all([
      api.getMacContacts(),
      api.getLinkedIds(),
    ])

    if (mac?.error) {
      document.getElementById('contacts-list').innerHTML =
        `<div class="empty"><p>⚠️ ${mac.error}<br><small>Grant access in System Settings → Privacy → Contacts</small></p></div>`
      return
    }

    macContacts = mac || []
    linkedIds = new Set(ids || [])
    renderList()
  }

  function renderList() {
    const q = searchQuery.toLowerCase()
    const filtered = macContacts.filter(c =>
      !q ||
      c.name.toLowerCase().includes(q) ||
      c.company.toLowerCase().includes(q) ||
      c.email.toLowerCase().includes(q)
    )

    // Sort: linked first, then alphabetically
    filtered.sort((a, b) => {
      const aLinked = linkedIds.has(a.identifier)
      const bLinked = linkedIds.has(b.identifier)
      if (aLinked !== bLinked) return aLinked ? -1 : 1
      return a.name.localeCompare(b.name)
    })

    const list = document.getElementById('contacts-list')
    if (filtered.length === 0) {
      list.innerHTML = '<div class="empty"><div class="icon">🔍</div><p>No contacts found</p></div>'
      return
    }

    list.innerHTML = filtered.map(c => {
      const linked = linkedIds.has(c.identifier)
      const initial = c.name.charAt(0).toUpperCase() || '?'
      const sub = [c.company, c.email].filter(Boolean).join(' · ')
      return `
        <div class="contact-item ${linked ? 'linked' : ''}" data-id="${c.identifier}">
          <div class="avatar">${initial}</div>
          <div class="contact-info">
            <div class="contact-name">${esc(c.name)}</div>
            ${sub ? `<div class="contact-sub">${esc(sub)}</div>` : ''}
          </div>
          ${linked ? '<span class="badge badge-synced">Synced</span>' : ''}
          <button class="action-btn ${linked ? 'unlink' : 'import'}" data-id="${c.identifier}">
            ${linked ? 'Remove' : 'Import'}
          </button>
        </div>
      `
    }).join('')

    list.querySelectorAll('.action-btn').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation()
        const id = btn.dataset.id
        const isLinked = linkedIds.has(id)
        btn.disabled = true
        btn.textContent = isLinked ? 'Removing…' : 'Importing…'

        if (isLinked) {
          await api.unlinkContact(id)
          linkedIds.delete(id)
        } else {
          const res = await api.importContact(id)
          if (res?.error) {
            btn.disabled = false
            btn.textContent = 'Retry'
            return
          }
          linkedIds.add(id)
        }
        renderList()
      })
    })
  }

  // Search
  document.getElementById('search-input').addEventListener('input', (e) => {
    searchQuery = e.target.value
    renderList()
  })

  // Sync now
  document.getElementById('sync-btn').addEventListener('click', async () => {
    const btn = document.getElementById('sync-btn')
    btn.disabled = true
    btn.textContent = 'Syncing…'
    await api.syncNow()
    btn.disabled = false
    btn.textContent = 'Sync Now'
    await loadContacts() // refresh linked state
  })

  // Sync status messages from main process
  api.onSyncStatus((msg) => {
    const el = document.getElementById('sync-msg')
    el.textContent = msg
    el.classList.remove('hidden')
    setTimeout(() => el.classList.add('hidden'), 5000)
  })

  // ── Helpers ───────────────────────────────────────────────────────────────

  function showError(id, msg) {
    const el = document.getElementById(id)
    el.textContent = msg
    el.classList.remove('hidden')
  }
  function hideError(id) {
    document.getElementById(id).classList.add('hidden')
  }
  function esc(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
  }

  init()
</script>
</body>
</html>
